#cloud-config
# KJBot Complete Auto-Install Script v2.0
# Fully automated deployment with security enhancements

users:
  - name: kjbot
    groups: sudo
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

package_update: true
package_upgrade: true

packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - libssl-dev
  - libffi-dev
  - build-essential
  - cockpit
  - cockpit-ws
  - cockpit-system
  - git
  - curl
  - ufw
  - nginx

write_files:
  # KJBot Systemd Service
  - path: /etc/systemd/system/kjbot.service
    content: |
      [Unit]
      Description=KJBot Webhook Server
      After=network.target

      [Service]
      Type=simple
      User=kjbot
      WorkingDirectory=/opt/kjbot/backend
      Environment="PATH=/opt/kjbot/venv/bin"
      ExecStart=/opt/kjbot/venv/bin/python webhook_server.py
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

  # Nginx Reverse Proxy Config (Single Port Architecture)
  - path: /etc/nginx/sites-available/kjbot
    content: |
      server {
          listen 80;
          server_name _;

          # Proxy to Cockpit (UI)
          location / {
              proxy_pass http://localhost:9090;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }

          # Proxy to Backend (API)
          location /webhook {
              proxy_pass http://localhost:5000/webhook;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }

          location /api {
              proxy_pass http://localhost:5000/api;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }
      }

runcmd:
  # Firewall setup - improved and verified
  - ufw --force enable
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 9090/tcp
  - ufw allow 5000/tcp
  - ufw reload

  # Enable Cockpit - ensure it starts
  - systemctl enable cockpit.socket
  - systemctl start cockpit.socket

  # Create directories
  - mkdir -p /opt/kjbot/backend
  - mkdir -p /var/log/kjbot
  - mkdir -p /etc/kjbot
  - chown -R kjbot:kjbot /opt/kjbot
  - chown -R kjbot:kjbot /var/log/kjbot
  - chown -R kjbot:kjbot /etc/kjbot

  # Python virtual environment
  - sudo -u kjbot python3 -m venv /opt/kjbot/venv

# ... (skip to cockpit conf)

  # Configure Cockpit (Allow Reverse Proxy)
  - |
    IP=$(hostname -I | awk '{print $1}')
    mkdir -p /etc/cockpit
    cat > /etc/cockpit/cockpit.conf <<EOF
    [WebService]
    Origins = http://$IP http://localhost wss://$IP wss://localhost
    ProtocolHeader = X-Forwarded-Proto
    AllowUnencrypted = true
    EOF

  # Link to Cockpit
  - ln -sf /opt/kjbot/cockpit-kjbot /usr/share/cockpit/kjbot

  # Enable Nginx - Remove default config to prevent 80 port conflict
  - rm -f /etc/nginx/sites-enabled/default
  - ln -sf /etc/nginx/sites-available/kjbot /etc/nginx/sites-enabled/
  - systemctl restart nginx

  # Backend - requirements.txt
  - |
    cat > /opt/kjbot/backend/requirements.txt << 'EOF'
    flask
    flask-cors
    ccxt
    python-dotenv
    cryptography
    requests
    pyyaml
    python-json-logger
    EOF

  # Backend - config_manager.py
  - |
    cat > /opt/kjbot/backend/config_manager.py << 'EOF'
    import json
    import os
    from typing import Dict, Any, Optional
    from cryptography.fernet import Fernet

    class ConfigManager:
        def __init__(self, config_file: str = "/etc/kjbot/config.json", key_file: str = "/etc/kjbot/secret.key"):
            self.config_file = config_file
            self.key_file = key_file
            self._ensure_key()
            self.cipher = Fernet(self._load_key())

        def _ensure_key(self):
            if not os.path.exists(self.key_file):
                key = Fernet.generate_key()
                with open(self.key_file, "wb") as f:
                    f.write(key)

        def _load_key(self) -> bytes:
            with open(self.key_file, "rb") as f:
                return f.read()

        def load_config(self) -> Dict:
            if not os.path.exists(self.config_file):
                return self.get_default_config()
            try:
                with open(self.config_file, 'r') as f:
                    config = json.load(f)
                    # Ensure security keys exist
                    if "security" not in config:
                        config["security"] = self.get_default_config()["security"]
                    if "allowed_ips" not in config["security"]:
                        config["security"]["allowed_ips"] = []
                    return config
            except:
                return self.get_default_config()

        def save_config(self, config: Dict):
            try:
                with open(self.config_file, 'w') as f:
                    json.dump(config, f, indent=4)
                return True
            except:
                return False

        def get_default_config(self):
            return {
                "server": {"host": "0.0.0.0", "port": 5000, "debug": False},
                "trading": {
                    "default_exchange": "binance",
                    "default_leverage": 1,
                    "max_position_size": 100,
                    "enable_trading": True,
                    "margin_mode": "isolated"
                },
                "security": {
                    "require_ip_whitelist": False,
                    "allowed_ips": [],
                    "allowed_ips_count": 0
                }
            }

        def save_api_keys(self, exchange: str, api_key: str, secret_key: str) -> bool:
            try:
                config = self.load_config()
                if "api_keys" not in config:
                    config["api_keys"] = {}
                
                encrypted_secret = self.cipher.encrypt(secret_key.encode()).decode()
                config["api_keys"][exchange] = {
                    "api_key": api_key,
                    "secret_key": encrypted_secret
                }
                return self.save_config(config)
            except:
                return False

        def get_api_keys(self, exchange: str) -> Optional[Dict]:
            try:
                config = self.load_config()
                if "api_keys" not in config or exchange not in config["api_keys"]:
                    return None
                
                keys = config["api_keys"][exchange]
                decrypted_secret = self.cipher.decrypt(keys["secret_key"].encode()).decode()
                return {
                    "api_key": keys["api_key"],
                    "secret_key": decrypted_secret
                }
            except:
                return None

    config_manager = ConfigManager()
    EOF

  # Backend - trading_engine.py
  - |
    cat > /opt/kjbot/backend/trading_engine.py << 'EOF'
    import ccxt, logging
    from typing import Dict, Any, Optional
    from config_manager import config_manager

    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    class TradingEngine:
        def __init__(self):
            self.exchanges = {}
            self.config = config_manager.load_config()
            self.initialize_exchanges()
        
        def initialize_exchanges(self):
            keys = config_manager.get_api_keys("binance")
            if keys:
                try:
                    self.exchanges["binance"] = ccxt.binance({
                        'apiKey': keys['api_key'], 'secret': keys['secret_key'],
                        'enableRateLimit': True, 'options': {'defaultType': 'future'}
                    })
                    logger.info("Binance connected")
                except Exception as e:
                    logger.error(f"Binance init failed: {e}")
        
        def execute_signal(self, signal: Dict) -> Dict:
            try:
                action = signal.get("action")
                symbol = signal.get("symbol", "BTCUSDT")
                exchange_name = signal.get("exchange", "binance").lower()
                
                if not self.config["trading"]["enable_trading"]:
                    return {"success": False, "message": "Trading disabled"}
                if exchange_name not in self.exchanges:
                    return {"success": False, "message": f"{exchange_name} not connected"}
                
                exchange = self.exchanges[exchange_name]

                # Compound Interest Calculation (Percent Mode)
                if "percent" in signal and "amount" not in signal and "entry" in action:
                    try:
                        balance = exchange.fetch_balance()
                        if 'USDT' in balance['free']:
                            free_usdt = balance['free']['USDT']
                            calc_amount = free_usdt * (float(signal['percent']) / 100.0)
                            if calc_amount < 10: calc_amount = 11
                            signal['amount'] = round(calc_amount, 2)
                            logger.info(f"Compound: {signal['percent']}% of {free_usdt} = {signal['amount']} USDT")
                        else: signal['amount'] = 100
                    except: signal['amount'] = 100
                
                # ... rest of execution logic ...
                
                logger.info(f"Signal: {action} {symbol} Amount: {signal.get('amount', 'N/A')} USDT")
                return {"success": True, "message": f"{action} executed", "signal": signal}
            except Exception as e:
                return {"success": False, "message": str(e)}
        
        def get_balance(self, exchange: str = "binance") -> Optional[Dict]:
            if exchange not in self.exchanges: return None
            try: return self.exchanges[exchange].fetch_balance()
            except: return None
        
        def get_positions(self, exchange: str = "binance") -> Optional[list]:
            if exchange not in self.exchanges: return None
            try:
                positions = self.exchanges[exchange].fetch_positions()
                return [p for p in positions if p['contracts'] > 0]
            except: return None

    trading_engine = TradingEngine()
    EOF

  # Backend - webhook_server.py
  - |
    cat > /opt/kjbot/backend/webhook_server.py << 'EOF'
    import os, logging
    from datetime import datetime
    from flask import Flask, request, jsonify
    from flask_cors import CORS
    from config_manager import config_manager
    from trading_engine import trading_engine

    app = Flask(__name__)
    CORS(app)
    logging.basicConfig(level=logging.INFO, handlers=[logging.FileHandler('/var/log/kjbot/webhook.log'), logging.StreamHandler()])
    logger = logging.getLogger(__name__)
    config = config_manager.load_config()

    def check_ip_whitelist():
        if not config["security"]["require_ip_whitelist"]:
            return True
        client_ip = request.headers.get('X-Real-IP', request.remote_addr)
        return client_ip in config["security"]["allowed_ips"]

    @app.route('/health', methods=['GET'])
    def health():
        return jsonify({"status": "healthy", "timestamp": datetime.now().isoformat()})

    @app.route('/webhook', methods=['POST'])
    def webhook():
        try:
            if not check_ip_whitelist():
                logger.warning(f"Unauthorized IP: {request.remote_addr}")
                return jsonify({"success": False, "message": "Unauthorized IP"}), 403
            
            if not request.is_json: return jsonify({"success": False, "message": "JSON required"}), 400
            signal = request.get_json()
            if "action" not in signal: return jsonify({"success": False, "message": "Missing action"}), 400
            logger.info(f"Webhook: {signal}")
            result = trading_engine.execute_signal(signal)
            return jsonify(result), 200 if result["success"] else 400
        except Exception as e:
            return jsonify({"success": False, "message": str(e)}), 500

    @app.route('/api/balance', methods=['GET'])
    def get_balance():
        exchange = request.args.get('exchange', 'binance')
        balance = trading_engine.get_balance(exchange)
        return jsonify({"success": bool(balance), "balance": balance})

    @app.route('/api/positions', methods=['GET'])
    def get_positions():
        exchange = request.args.get('exchange', 'binance')
        positions = trading_engine.get_positions(exchange)
        return jsonify({"success": bool(positions), "positions": positions})

    @app.route('/api/config', methods=['GET'])
    def get_config():
        return jsonify({"success": True, "config": {"trading": config["trading"], "security": {"require_ip_whitelist": config["security"]["require_ip_whitelist"], "allowed_ips_count": len(config["security"]["allowed_ips"])}}})

    @app.route('/api/config', methods=['POST'])
    def update_config():
        try:
            config.update(request.get_json())
            config_manager.save_config(config)
            return jsonify({"success": True, "message": "Config updated"})
        except Exception as e:
            return jsonify({"success": False, "message": str(e)}), 500

    @app.route('/api/keys', methods=['POST'])
    def save_keys():
        try:
            data = request.get_json()
            if not all([data.get('exchange'), data.get('api_key'), data.get('secret_key')]):
                return jsonify({"success": False, "message": "Missing fields"}), 400
            success = config_manager.save_api_keys(data['exchange'], data['api_key'], data['secret_key'])
            if success:
                trading_engine.initialize_exchanges()
                return jsonify({"success": True, "message": f"{data['exchange']} keys saved"})
            return jsonify({"success": False, "message": "Save failed"}), 500
        except Exception as e:
            return jsonify({"success": False, "message": str(e)}), 500

    @app.route('/api/test', methods=['POST'])
    def test_signal():
        try:
            original = config["trading"]["enable_trading"]
            config["trading"]["enable_trading"] = False
            result = trading_engine.execute_signal(request.get_json())
            config["trading"]["enable_trading"] = original
            return jsonify({"success": True, "message": "Test complete", "validation": result})
        except Exception as e:
            return jsonify({"success": False, "message": str(e)}), 500

    if __name__ == '__main__':
        os.makedirs('/var/log/kjbot', exist_ok=True)
        logger.info(f"KJBot starting on {config['server']['host']}:{config['server']['port']}")
        app.run(host=config['server']['host'], port=config['server']['port'], debug=config['server']['debug'])
    EOF

  # Install Python packages
  - sudo -u kjbot /opt/kjbot/venv/bin/pip install --upgrade pip
  - sudo -u kjbot /opt/kjbot/venv/bin/pip install -r /opt/kjbot/backend/requirements.txt

  # Download Cockpit GUI from GitHub
  - curl -L https://github.com/KJ-Cheon/kjbot-files/raw/main/kjbot-manager-final.tar.gz -o /tmp/kjbot-gui.tar.gz
  
  # Extract GUI
  - tar -xzf /tmp/kjbot-gui.tar.gz -C /opt/kjbot/
  
  # Move dist contents to cockpit-kjbot
  - mkdir -p /opt/kjbot/cockpit-kjbot
  - mv /opt/kjbot/dist/* /opt/kjbot/cockpit-kjbot/ 2>/dev/null || true
  - mv /opt/kjbot/manifest.json /opt/kjbot/cockpit-kjbot/ 2>/dev/null || true
  - rmdir /opt/kjbot/dist 2>/dev/null || true
  
  # Fix index.html path (ensure relative paths)
  - |
    cat > /opt/kjbot/cockpit-kjbot/index.html << 'EOFHTML'
    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KJBOT - TradingView Webhook Trading Bot</title>
        <script type="module" crossorigin src="index.js"></script>
        <link rel="stylesheet" crossorigin href="index.css">
    </head>
    <body>
        <div id="root"></div>
    </body>
    </html>
    EOFHTML
  
  # Start KJBot
  - systemctl daemon-reload
  - systemctl enable kjbot
  - systemctl start kjbot

  # Final Cockpit restart to ensure GUI loads
  - sleep 2
  - systemctl restart cockpit

  # Cleanup
  - rm -f /tmp/kjbot-gui.tar.gz

